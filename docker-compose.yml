services:
  frontend:
    build:  ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
  
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./backend:/app
